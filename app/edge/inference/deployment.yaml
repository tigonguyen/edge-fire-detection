apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference
  namespace: default
  labels:
    app: inference
    tier: edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference
  template:
    metadata:
      labels:
        app: inference
        tier: edge
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      nodeSelector:
        node-role: edge

      initContainers:
        - name: model-init
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "Downloading model from model-server..."
              wget -O /model/fire_detection.onnx \
                http://model-server.default.svc:8000/model
              echo "Model ready."
          volumeMounts:
            - name: model-vol
              mountPath: /model

      containers:
        - name: inference
          image: fire-inference:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MQTT_HOST
              value: mqtt-broker.default.svc
            - name: MODEL_PATH
              value: /model/fire_detection.onnx
            - name: METRICS_PORT
              value: "9090"
            - name: CLASS_NAMES
              value: "fire,normal"
          ports:
            - containerPort: 9090
              name: metrics
          volumeMounts:
            - name: model-vol
              mountPath: /model
              readOnly: true
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
            requests:
              memory: 256Mi
              cpu: 250m
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 30

      volumes:
        - name: model-vol
          emptyDir: {}
