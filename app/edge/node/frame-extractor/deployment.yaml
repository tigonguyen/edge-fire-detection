apiVersion: apps/v1
kind: Deployment
metadata:
  name: frame-extractor-node
  namespace: default
  labels:
    app: frame-extractor
    tier: edge
    location: node
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frame-extractor
  template:
    metadata:
      labels:
        app: frame-extractor
        tier: edge
        location: node
    spec:
      containers:
        - name: extractor
          image: fire-extractor-python:v2
          imagePullPolicy: Never
          env:
            - name: MQTT_BROKER
              value: mqtt-broker-node.default.svc
            - name: MQTT_PORT
              value: "1883"
            - name: VIDEO_DIR
              value: "/videos"
            - name: FPS
              value: "2"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            limits:
              memory: 256Mi
              cpu: "500m"
            requests:
              memory: 128Mi
              cpu: "250m"
