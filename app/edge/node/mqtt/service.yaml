apiVersion: v1
kind: Service
metadata:
  name: mqtt-broker-node
  namespace: default
  labels:
    app: mqtt-broker
    tier: edge
spec:
  selector:
    app: mqtt-broker
    location: node
  ports:
    - port: 1883
      targetPort: 1883
      name: mqtt
    - port: 9001
      targetPort: 9001
      name: websockets
