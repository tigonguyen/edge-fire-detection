apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-broker
  namespace: default
  labels:
    app: mqtt-broker
    tier: edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mqtt-broker
  template:
    metadata:
      labels:
        app: mqtt-broker
        tier: edge
    spec:
      nodeSelector:
        node-role: edge
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2
          ports:
            - containerPort: 1883
              name: mqtt
          volumeMounts:
            - name: config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
          resources:
            limits:
              memory: 128Mi
              cpu: 200m
            requests:
              memory: 64Mi
              cpu: 50m
      volumes:
        - name: config
          configMap:
            name: mqtt-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mqtt-config
  namespace: default
data:
  mosquitto.conf: |
    listener 1883
    allow_anonymous true
    max_message_size 1048576
