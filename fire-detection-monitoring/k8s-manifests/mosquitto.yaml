apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: fire-detection
data:
  mosquitto.conf: |
    listener 1883
    listener 9001
    protocol websockets
    
    allow_anonymous true
    persistence true
    persistence_location /mosquitto/data/
    
    log_dest file /mosquitto/log/mosquitto.log
    log_type all
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: fire-detection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      containers:
      - name: mosquitto
        image: eclipse-mosquitto:2
        ports:
        - containerPort: 1883
        - containerPort: 9001
        volumeMounts:
        - name: config
          mountPath: /mosquitto/config/mosquitto.conf
          subPath: mosquitto.conf
        - name: data
          mountPath: /mosquitto/data
        - name: log
          mountPath: /mosquitto/log
      volumes:
      - name: config
        configMap:
          name: mosquitto-config
      - name: data
        emptyDir: {}
      - name: log
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: fire-detection
spec:
  selector:
    app: mosquitto
  ports:
  - name: mqtt
    port: 1883
    targetPort: 1883
  - name: websocket
    port: 9001
    targetPort: 9001
