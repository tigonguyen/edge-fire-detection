apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: fire-detection
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        server {
            listen 80;
            server_name localhost;
            location /images/ {
                alias /usr/share/nginx/html/images/;
                autoindex on;
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods 'GET, OPTIONS';
                expires 1d;
                add_header Cache-Control "public, immutable";
            }
        }
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: exporter-images-pvc
  namespace: fire-detection
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: exporter
  namespace: fire-detection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exporter
  template:
    metadata:
      labels:
        app: exporter
    spec:
      containers:
      # Nginx Sidecar
      - name: nginx-images
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: images-storage
          mountPath: /usr/share/nginx/html/images
          readOnly: true
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
          readOnly: true

      # Python Exporter Core
      - name: fire-exporter
        image: fire_exporter:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: api
        env:
        - name: MQTT_BROKER
          value: mosquitto.fire-detection.svc.cluster.local
        - name: MQTT_PORT
          value: "1883"
        - name: IMAGES_DIR
          value: /app/images
        - name: TELEGRAM_BOT_TOKEN
          value: "${TELEGRAM_BOT_TOKEN}"
        - name: TELEGRAM_CHAT_ID
          value: "${TELEGRAM_CHAT_ID}"
        - name: SIMULATE_FIRE
          value: "false"
        - name: SIMULATE_SMOKE
          value: "false"
        - name: FIRE_MODEL_PATH
          value: /app/model/fire_detection.onnx
        - name: ALERT_COOLDOWN_SECONDS
          value: "300"
        volumeMounts:
        - name: images-storage
          mountPath: /app/images
        - name: model-storage
          mountPath: /app/model
      
      volumes:
      - name: images-storage
        persistentVolumeClaim:
          claimName: exporter-images-pvc
      - name: nginx-config
        configMap:
          name: nginx-config
      - name: model-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: exporter
  namespace: fire-detection
spec:
  selector:
    app: exporter
  ports:
  - name: api
    port: 8000
    targetPort: 8000
  - name: http-images
    port: 80
    targetPort: 80
