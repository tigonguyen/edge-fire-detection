apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: fire-detection
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 2m
      telegram_api_url: "https://api.telegram.org"
    route:
      group_by: ['alertname', 'device_id']
      group_wait: 15m
      group_interval: 10m
      repeat_interval: 30m
      receiver: 'telegram-reminder'
      routes:
        - match:
            severity: critical
          receiver: 'telegram-reminder'
          group_wait: 15m
          repeat_interval: 15m
        - match:
            severity: warning
          receiver: 'telegram-reminder'
          group_wait: 15m
          repeat_interval: 30m
    receivers:
      - name: 'telegram-reminder'
        telegram_configs:
          - bot_token: '${TELEGRAM_BOT_TOKEN}' # Needs to be manually replaced before applying
            chat_id: ${TELEGRAM_CHAT_ID}
            parse_mode: 'HTML'
            send_resolved: true
            message: |
              {{ if eq .Status "firing" }}
              {{ range .Alerts.Firing }}
              ⏰ <b>NHẮC NHỞ: CẢNH BÁO CHÁY CHƯA ĐƯỢC XỬ LÝ!</b>
              🔥 Alert vẫn đang active
              📍 <b>Vị trí:</b> {{ .Labels.location }}
              🌍 <b>Tọa độ:</b> <a href="https://maps.google.com/?q={{ .Labels.latitude }},{{ .Labels.longitude }}">{{ .Labels.latitude }}, {{ .Labels.longitude }}</a>
              📊 <b>Độ tin cậy:</b> {{ .Annotations.confidence }}
              🔍 <b>Loại:</b> {{ .Labels.class }}
              ⏰ <b>Phát hiện lúc:</b> {{ .StartsAt.Format "2006-01-02 15:04:05" }}
              🆔 Alert ID: <code>{{ .Labels.alert_id }}</code>
              📡 Device: <code>{{ .Labels.device_id }}</code>
              ⚠️ <b>Vui lòng kiểm tra và xác nhận xử lý!</b>
              {{ end }}
              {{ else }}
              {{ range .Alerts.Resolved }}
              ✅ <b>ALERT ĐÃ ĐƯỢC XỬ LÝ (Alertmanager)</b>
              📍 <b>Vị trí:</b> {{ .Labels.location }}
              🆔 Alert ID: <code>{{ .Labels.alert_id }}</code>
              ⏰ <b>Resolved lúc:</b> {{ .EndsAt.Format "2006-01-02 15:04:05" }}
              ✅ Không còn nhận reminder cho alert này.
              {{ end }}
              {{ end }}
    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'device_id']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: fire-detection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
      - name: alertmanager
        image: prom/alertmanager:v0.26.0
        args:
        - "--config.file=/etc/alertmanager/alertmanager.yml"
        ports:
        - containerPort: 9093
          name: web
        volumeMounts:
        - name: config-volume
          mountPath: /etc/alertmanager
      volumes:
      - name: config-volume
        configMap:
          name: alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: fire-detection
  labels:
    app: alertmanager
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
      name: web
